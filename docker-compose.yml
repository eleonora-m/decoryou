##########################################################################
# Docker Compose - Full Stack for Development & Testing
##########################################################################

version: '3.9'

services:
  # Main Application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: decoryou-app
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=info
      - DATABASE_URL=mysql://root:rootpassword@db:3306/decoryou
      - REDIS_URL=redis://cache:6379
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-decoryou-dev}
    ports:
      - "8080:80"
    networks:
      - decoryou-network
    depends_on:
      - db
      - cache
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    labels:
      - "com.example.app=decoryou"
      - "com.example.environment=development"

  # MySQL Database
  db:
    image: mysql:8.0-alpine
    container_name: decoryou-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: decoryou
      MYSQL_USER: decoryou
      MYSQL_PASSWORD: ${DB_PASSWORD:-decoryou}
    ports:
      - "3306:3306"
    networks:
      - decoryou-network
    volumes:
      - db-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      - "com.example.service=database"

  # Redis Cache
  cache:
    image: redis:7-alpine
    container_name: decoryou-cache
    ports:
      - "6379:6379"
    networks:
      - decoryou-network
    volumes:
      - cache-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      - "com.example.service=cache"

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: decoryou-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - decoryou-network
    volumes:
      - minio-data:/minio_root
    command: minio server /minio_root --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      - "com.example.service=storage"

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: decoryou-prometheus
    ports:
      - "9090:9090"
    networks:
      - decoryou-network
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      - "com.example.service=monitoring"

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: decoryou-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_DISABLE_BRUTE_FORCE_LOGIN_PROTECTION: "false"
    ports:
      - "3000:3000"
    networks:
      - decoryou-network
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      - "com.example.service=dashboard"

  # cAdvisor - Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: decoryou-cadvisor
    ports:
      - "8081:8080"
    networks:
      - decoryou-network
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    labels:
      - "com.example.service=monitoring"

  # Node Exporter - System Metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: decoryou-node-exporter
    ports:
      - "9100:9100"
    networks:
      - decoryou-network
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    labels:
      - "com.example.service=monitoring"

networks:
  decoryou-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  db-data:
    driver: local
  cache-data:
    driver: local
  minio-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
