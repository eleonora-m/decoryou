# Docker Compose Override - Local development configuration
# This file overrides settings for local development
# Usage: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: builder  # Use builder stage for development
    environment:
      - NODE_ENV=development
      - DEBUG=true
    ports:
      - "3000:3000"  # Hot reload port
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  db:
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    ports:
      - "3000:3000"
