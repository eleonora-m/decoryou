---
# Ansible playbook host/inventory variables
# File: ansible/inventories/dev/hosts.yml

all:
  vars:
    ansible_user: ec2-user
    ansible_ssh_private_key_file: ~/.ssh/decoryou-dev.pem
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
    # Application variables
    app_environment: development
    app_name: decoryou
    app_port: 80
    docker_image: nginx:latest
    
    # Docker configuration
    docker_registry: "{{ aws_account_id }}.dkr.ecr.us-east-1.amazonaws.com"
    docker_network: decoryou-network
    
  groups:
    webservers:
      hosts:
        web[1:3]:
    databases:
      hosts:
        db[1:1]:

webservers:
  vars:
    deployment_version: "latest"
    
databases:
  vars:
    mysql_root_password: "{{ vault_mysql_root_password }}"
    mysql_database: decoryou_dev
