---
# Ansible playbook host/inventory variables
# File: ansible/inventories/prod/hosts.yml

all:
  vars:
    ansible_user: ec2-user
    ansible_ssh_private_key_file: ~/.ssh/decoryou-prod.pem
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
    # Application variables
    app_environment: production
    app_name: decoryou
    app_port: 80
    docker_image: "{{ aws_account_id }}.dkr.ecr.us-east-1.amazonaws.com/decoryou:latest"
    
    # Docker configuration
    docker_registry: "{{ aws_account_id }}.dkr.ecr.us-east-1.amazonaws.com"
    docker_network: decoryou-network
    
  groups:
    webservers:
      hosts:
        web[1:5]:
    databases:
      hosts:
        db[1:2]:

webservers:
  vars:
    deployment_version: "{{ deployment_version }}"
    
databases:
  vars:
    mysql_root_password: "{{ vault_mysql_root_password }}"
    mysql_database: decoryou_prod
    mysql_replica_enabled: true
