[defaults]
# Ansible Configuration File for decoryou project
# Path: ansible/ansible.cfg

# Inventory file location
inventory = ./inventories/dev/hosts.yml

# Host key checking - disable for new hosts
host_key_checking = False

# Collection paths
collections_paths = ./collections

# Roles path
roles_path = ./roles

# Use paramiko (slower but works on all platforms) or openssh (faster)
transport = smart

# Connection timeout (seconds)
timeout = 30

# Become settings
become = True
become_method = sudo
become_user = root

# Fact caching
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ./facts

# Verbosity (-v, -vv, -vvv)
# verbosity = 1

# Module defaults
module_utils = ./library
action_plugins = ./plugins/action

# Logging
log_path = ./logs/ansible.log

[inventory]
# Comma-separated list for inventory parsing
enable_plugins = yaml, ini, aws_ec2

[privilege_escalation]
# Become settings
become = True
become_method = sudo
become_user = root

[ssh_connection]
# SSH settings
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
