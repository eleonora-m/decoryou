##########################################################################
# Prometheus Configuration
# Metrics collection and scraping configuration
##########################################################################

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'decoryou'
    environment: '{{ environment }}'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:9090']

  # Application metrics
  - job_name: 'decoryou-app'
    static_configs:
      - targets: ['localhost:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme

  # Docker containers via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # System metrics via Node Exporter
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # MySQL metrics (if using postgres_exporter)
  - job_name: 'mysql'
    static_configs:
      - targets: ['localhost:9104']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['cache:6379']

  # MinIO metrics
  - job_name: 'minio'
    bearer_token: ''
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']
